name: Auto Update Scoop Bucket

on:
  schedule:
    - cron: '0 3 * * 1'  # 每周一 UTC 03:00 执行（可按需调整）
  workflow_dispatch:      # 支持 GitHub Actions 页面手动触发

permissions:
  contents: write
  pull-requests: write

jobs:
  autoupdate:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run checkver
        run: |
          # 解除 CI 环境默认脚本执行限制
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass

          # 参数说明：
          # -Dir .          → 指定清单所在目录（根目录为 .，若在 bucket/ 子目录则改为 -Dir bucket）
          # -Update         → 匹配新版本后自动写回 JSON 文件
          # -SkipUpdated    → 跳过已是最新版本的清单，提升效率并减少无意义提交
          # 路径提示：若你的 checkver.ps1 实际位于 ./scoop/bin/，请将下方路径改为 ./scoop/bin/checkver.ps1
          pwsh ./bin/checkver.ps1 -Dir ./bucket -Update -SkipUpdated

      - name: Check for changes
        id: git-status
        run: |
          $hasChanges = (git status --porcelain).Length -gt 0
          echo "has_changes=$hasChanges" >> $env:GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.git-status.outputs.has_changes == 'True'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(bucket): auto-update manifests"
          title: "🤖 Auto-update manifests"
          body: |
            本 PR 由 GitHub Actions 自动触发，使用 `checkver -Update -SkipUpdated` 更新清单文件。
            请检查版本、哈希值及下载链接是否正确，确认无误后合并。
          branch: autoupdate/manifests
          delete-branch: true
